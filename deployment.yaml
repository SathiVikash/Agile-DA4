apiVersion: apps/v1
kind: Deployment
metadata:
name: sathivikash/html-demo
spec:
replicas: 2
selector:
matchLabels:
app: sathivikash/html-demo
template:
metadata:
labels:
app: sathivikash/html-demo
spec:
containers:
- name: sathivikash/html-demo
image: sathivikash/html-demo
ports:
- containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
name: sathivikash/html-demo
spec:
type: NodePort
selector:
app: sathivikash/html-demo
ports:
- port: 80
targetPort: 80
nodePort: 30010
